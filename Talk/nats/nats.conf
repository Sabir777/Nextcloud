# NATS server configuration for Talk
port: 4222
http_port: 8222

# Логирование
log_file: "/var/log/nats.log"
logtime: true
debug: false
trace: false

# Лимиты
max_connections: 1000
max_control_line: 4096
max_payload: 65536
max_pending: 67108864

# Кластеринг отключен для простой установки
cluster {
  port: 6222
}

# Мониторинг
monitor_port: 8222
