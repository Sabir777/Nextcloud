# Базовая конфигурация Redis для Talk
bind 0.0.0.0
port 6379
protected-mode no
timeout 0
keepalive 300

# Настройки сохранения
save 900 1
save 300 10  
save 60 10000

# Логирование
loglevel notice
logfile ""

# Настройки памяти
maxmemory 256mb
maxmemory-policy allkeys-lru

# Отключить опасные команды
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command CONFIG ""
rename-command DEBUG ""
